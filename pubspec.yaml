name: edumov
description: A educação em Movimento
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  
  # Ícones e UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  
  # Banco de dados
  sqflite: ^2.3.3
  path: ^1.9.0
  image_picker: ^1.0.4
  
  # PDF e impressão
  pdf: ^3.11.0
  printing: ^5.13.0
  
  # Utilitários
  intl: ^0.19.0
  signature: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# ===== CONFIGURAÇÃO DO ÍCONE =====
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/edumov_logo.png"  # ← Logo principal
  adaptive_icon_background: "#ffffff"         # ← Fundo azul EduMov
  adaptive_icon_foreground: "assets/icon/edumov_icon.png"  # ← Ícone branco
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/edumov_logo.png"
    background_color: "#1A73E8"
    theme_color: "#1A73E8"
  windows:
    generate: true
    image_path: "assets/icon/edumov_logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/edumov_logo.png"

# ===== CONFIGURAÇÃO DO FLUTTER =====
flutter:
  uses-material-design: true  # ← ESSENCIAL!
  
  assets:
    # Ícones do app
    - assets/icon/
    - assets/icon/edumov_logo.png
    - assets/icon/edumov_icon.png
    - assets/icon/app_icon.png
    
    # Assinaturas da equipe
    - assets/assinaturas/
    
    # Imagens do app
    - assets/imagens/
    - assets/imagens/eduMov_logo.png
    
    # Outras imagens

  # ===== FONTES (Opcional) =====
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-Italic.ttf
          style: italic