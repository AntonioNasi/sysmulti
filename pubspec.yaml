name: Emulti_SME
description: Aplicativo de relatório de visitas
publish_to: 'none'

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.3
  path: ^1.9.0
  pdf: ^3.11.0
  printing: ^5.13.0
  path_provider: ^2.1.0
  package_info_plus: ^4.2.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  signature: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

# ⬇️ APENAS UM BLOCO flutter: ⬇️
flutter:
  uses-material-design: true  # <-- ESSENCIAL para os ícones!
  
  assets:
    - assets/icon/
    - assets/assinaturas/
    - assets/imagens/